<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nail Studio{% endblock %} — Διαχείριση Πελατών</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a href="{{ url_for('index') }}" class="brand">💅 Nail Studio</a>
        <nav>
            <a href="{{ url_for('index') }}">Πελάτες</a>
            <a href="{{ url_for('new_client') }}" class="btn-primary-small">+ Νέος Πελάτης</a>
        </nav>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-wrap">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Nail Studio · Σύστημα Διαχείρισης Πελατών</p>
    </footer>
</body>
</html>
