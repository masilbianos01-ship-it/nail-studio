{% extends "base.html" %}
{% block title %}{{ 'Επεξεργασία Επίσκεψης' if visit else 'Νέα Επίσκεψη' }}{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ 'Επεξεργασία Επίσκεψης' if visit else 'Νέα Επίσκεψη' }}</h1>
    <p class="subtitle">{{ client.full_name }}</p>
</div>

<div class="form-card">
    <form method="post">
        <div class="form-row">
            <div>
                <label for="visit_date">Ημερομηνία *</label>
                <input type="date" id="visit_date" name="visit_date" required
                       value="{{ visit.visit_date if visit else '' }}">
            </div>
            <div>
                <label for="price">Τιμή (€)</label>
                <input type="number" id="price" name="price" step="0.01" min="0"
                       value="{{ visit.price if visit and visit.price is not none else '' }}" placeholder="0.00">
            </div>
        </div>

        <label for="service">Υπηρεσία *</label>
        <input type="text" id="service" name="service" required
               value="{{ visit.service if visit else '' }}" placeholder="π.χ. Μανικιούρ Gel, Πεντικιούρ, Επέκταση Νυχιών">

        <label for="color_design">Χρώμα / Σχέδιο</label>
        <input type="text" id="color_design" name="color_design"
               value="{{ visit.color_design if visit else '' }}" placeholder="π.χ. Nude ροζ με γαλλικό">

        <label for="notes">Σημειώσεις</label>
        <textarea id="notes" name="notes" placeholder="Παρατηρήσεις για την επίσκεψη...">{{ visit.notes if visit else '' }}</textarea>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ 'Αποθήκευση' if visit else 'Προσθήκη Επίσκεψης' }}</button>
            <a href="{{ url_for('client_detail', client_id=client.id) }}" class="btn btn-secondary">Άκυρο</a>
        </div>
    </form>
</div>

{% endblock %}
