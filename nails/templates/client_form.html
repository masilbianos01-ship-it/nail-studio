{% extends "base.html" %}
{% block title %}{{ 'Επεξεργασία Πελάτη' if client else 'Νέος Πελάτης' }}{% endblock %}
{% block content %}

<div class="page-header">
    <h1>{{ 'Επεξεργασία Πελάτη' if client else 'Νέος Πελάτης' }}</h1>
</div>

<div class="form-card">
    <form method="post">
        <label for="full_name">Ονοματεπώνυμο *</label>
        <input type="text" id="full_name" name="full_name" required
               value="{{ client.full_name if client else '' }}" placeholder="π.χ. Μαρία Παπαδοπούλου">

        <div class="form-row">
            <div>
                <label for="phone">Τηλέφωνο</label>
                <input type="tel" id="phone" name="phone"
                       value="{{ client.phone if client else '' }}" placeholder="69XXXXXXXX">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ client.email if client else '' }}" placeholder="example@email.com">
            </div>
        </div>

        <label for="allergies">Αλλεργίες / Ευαισθησίες</label>
        <textarea id="allergies" name="allergies" placeholder="π.χ. Αλλεργία σε ακρυλικό, ευαίσθητο δέρμα...">{{ client.allergies if client else '' }}</textarea>

        <label for="notes">Σημειώσεις / Προτιμήσεις</label>
        <textarea id="notes" name="notes" placeholder="π.χ. Προτιμά απαλά χρώματα, ραντεβού Σάββατο πρωί...">{{ client.notes if client else '' }}</textarea>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ 'Αποθήκευση' if client else 'Προσθήκη Πελάτη' }}</button>
            {% if client %}
                <a href="{{ url_for('client_detail', client_id=client.id) }}" class="btn btn-secondary">Άκυρο</a>
            {% else %}
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Άκυρο</a>
            {% endif %}
        </div>
    </form>
</div>

{% endblock %}
